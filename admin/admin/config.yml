backend:
  name: git-gateway
  branch: main

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "site"
    label: "Site Content"
    files:
      - file: "site.json"
        label: "Site Settings"
        name: "settings"
        fields:
          - {label: "Site Title", name: "siteTitle", widget: "string"}
          - {label: "Hero Title", name: "heroTitle", widget: "string"}
          - {label: "Hero Subtitle", name: "heroSubtitle", widget: "text"}

  - name: "portfolio"
    label: "Portfolio"
    files:
      - file: "portfolio.json"
        label: "Portfolio Items"
        name: "portfolio"
