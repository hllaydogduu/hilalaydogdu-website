backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://hilalaydogdu.com"
display_url: "https://hilalaydogdu.com"

collections:
  - name: "site"
    label: "Website Settings"
    files:
      - file: "site.json"
        label: "Main Website Content"
        name: "settings"
        fields:
          - label: "Brand"
            name: "brand"
            widget: "object"
            fields:
              - { label: "Brand Name", name: "name", widget: "string" }
              - { label: "Logo Dark", name: "logo_dark", widget: "image", required: false }
              - { label: "Logo Light", name: "logo_light", widget: "image", required: false }

          - label: "Homepage Hero"
            name: "home"
            widget: "object"
            fields:
              - { label: "Small Top Text", name: "kicker", widget: "string" }
              - { label: "Main Title", name: "title", widget: "text" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
              - { label: "Primary Button Text", name: "primary_button_text", widget: "string" }
              - { label: "Primary Button Link", name: "primary_button_link", widget: "string" }
              - { label: "Secondary Button Text", name: "secondary_button_text", widget: "string" }
              - { label: "Secondary Button Link", name: "secondary_button_link", widget: "string" }

          - label: "Services"
            name: "services"
            widget: "list"
            fields:
              - { label: "Service Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }

          - label: "About Page"
            name: "about"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "About Text", name: "text", widget: "text" }
              - { label: "Portrait / About Image", name: "image", widget: "image", required: false }

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Phone", name: "phone", widget: "string" }
              - { label: "Instagram URL", name: "instagram", widget: "string" }
              - { label: "Instagram Handle", name: "instagram_handle", widget: "string" }

          - label: "Social Links"
            name: "socials"
            widget: "list"
            required: false
            fields:
              - { label: "Platform", name: "platform", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }

  - name: "portfolio"
    label: "Portfolio"
    files:
      - file: "portfolio.json"
        label: "Portfolio Items"
        name: "portfolio"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - "Fashion"
                  - "Wedding"
                  - "Campaign"
                  - "Product"
                  - "Event"
                  - "Video"
              - { label: "Main Image", name: "image", widget: "image", required: false }
              - { label: "Video URL", name: "video_url", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }
